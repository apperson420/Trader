name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  release-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm tooling
        run: npm install --no-audit --no-fund --no-save --package-lock=false playwright@latest
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run syntax checks
        run: npm test
      - name: Generate release manifest
        run: npm run release:manifest
      - name: Browser/UI smoke checks
        run: npm run test:ui
      - name: Live smoke test
        env:
          TRADER_LIVE_URL: ${{ vars.TRADER_LIVE_URL }}
        run: npm run test:smoke
      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trader-release-verification
          path: |
            RELEASE_MANIFEST.json
            artifacts/qa/**
          if-no-files-found: warn

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
